<div
  [class]="containerClasses"
  [title]="tooltip ?? ''"
  (click)="onRootClick($event)"
>
  <div [class.w-full]="fullWidth">
    <button
      data-dp-trigger
      type="button"
      [class]="wrapperClasses"
      [disabled]="isDisabled"
      [attr.aria-expanded]="isOpen"
      aria-haspopup="dialog"
      [attr.aria-label]="ariaLabel ?? null"
      [attr.aria-describedby]="ariaDescribedBy ?? null"
      [attr.aria-controls]="panelId"
      (keydown)="onTriggerKeydown($event)"
    >
      @if (leftIconTemplate) {
        <span [class]="triggerIconLeft" aria-hidden="true">
          <ng-container *ngTemplateOutlet="leftIconTemplate"></ng-container>
        </span>
      } @else if (leftIconClass) {
        <i [class]="leftIconClass + ' ' + triggerIconLeft" aria-hidden="true">{{ leftIconContent }}</i>
      }

      <span [class]="nativeFieldClasses + (showPlaceholderStyle ? ' text-gray-400' : '')">{{ displayLabel }}</span>

      @if (rightIconTemplate) {
        <span [class]="triggerIconRight" aria-hidden="true">
          <ng-container *ngTemplateOutlet="rightIconTemplate"></ng-container>
        </span>
      } @else if (rightIconClass) {
        <i [class]="rightIconClass + ' ' + triggerIconRight" aria-hidden="true">{{ rightIconContent }}</i>
      } @else if (showCalendarIcon) {
        <i class="material-icons text-gray-500 -ml-0.5 shrink-0 text-[1.125em] leading-none opacity-90" aria-hidden="true">calendar_today</i>
      }
    </button>
  </div>

  @if (isOpen) {
    <div
      data-arc-panel
      [class]="panelClasses + ' ' + panelPositionClasses"
      [id]="panelId"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="ariaLabel || 'Calendario'"
      (click)="$event.stopPropagation()"
    >
      <!-- Cabecera: mes + año usando dropdowns -->
      <div class="flex flex-wrap gap-2 mb-2 items-stretch">
        <dropdown-component
          class="flex-[1_1_8rem] min-w-0"
          [items]="monthDropdownItems"
          [selectedValue]="viewMonth0"
          [variant]="headerDropdownVariant"
          [size]="headerDropdownSize"
          [shape]="headerDropdownShape"
          [fullWidth]="true"
          [autoFlipPlacement]="true"
          [hideChevron]="true"
          [closeOnSelect]="true"
          [placeholder]="'Mes'"
          [ariaLabel]="'Elegir mes'"
          [customClass]="headerDropdownCustomClass"
          (itemSelected)="onMonthDropdownSelect($event)"
        ></dropdown-component>
        <dropdown-component
          class="flex-[1_1_5.5rem] min-w-0"
          [items]="yearDropdownItems"
          [selectedValue]="viewYear"
          [variant]="headerDropdownVariant"
          [size]="headerDropdownSize"
          [shape]="headerDropdownShape"
          [fullWidth]="true"
          [autoFlipPlacement]="true"
          [hideChevron]="true"
          [closeOnSelect]="true"
          [placeholder]="'Año'"
          [ariaLabel]="'Elegir año'"
          [customClass]="headerDropdownCustomClass"
          (itemSelected)="onYearDropdownSelect($event)"
        ></dropdown-component>
      </div>

      <!-- Cabecera días de la semana -->
      <div class="grid grid-cols-7 gap-0.5 mb-1" role="row">
        @for (w of orderedWeekdayLabels; track $index) {
          <span [class]="weekdayLabelClasses" role="columnheader">{{ w }}</span>
        }
      </div>

      <!-- Grilla de días -->
      <div class="flex flex-col gap-0.5" role="grid" [attr.aria-label]="'Días del mes'">
        @for (row of weeks; track $index; let ri = $index) {
          <div class="grid grid-cols-7 gap-0.5" role="row">
            @for (cell of row; track cell.date.getTime(); let ci = $index) {
              @let idx = cellFlatIndex(ri, ci);
              <button
                type="button"
                [class]="getDayCellClasses(cell, ri, ci)"
                role="gridcell"
                [disabled]="!cell.inMonth || cell.disabled"
                [attr.data-date-cell]="instanceId + '-' + idx"
                (focus)="onDayButtonFocus(ri, ci)"
                (click)="selectDay(cell)"
                (keydown)="onDayKeydown($event, cell, idx)"
              >
                {{ cell.label }}
              </button>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
