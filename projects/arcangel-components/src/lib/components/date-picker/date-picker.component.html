<div
  class="date-picker-container"
  [class.date-picker-container--open]="isOpen"
  [class.date-picker-container--full-width]="fullWidth"
  [class]="customClass"
  [title]="tooltip ?? ''"
  (click)="onRootClick($event)"
>
  <div class="date-picker-component" [class.w-full]="fullWidth">
    <button
      type="button"
      [class]="wrapperClasses"
      [disabled]="isDisabled"
      [attr.aria-expanded]="isOpen"
      aria-haspopup="dialog"
      [attr.aria-label]="ariaLabel ?? null"
      [attr.aria-describedby]="ariaDescribedBy ?? null"
      [attr.aria-controls]="panelId"
      (keydown)="onTriggerKeydown($event)"
    >
      @if (leftIconTemplate) {
        <span class="input-component__icon input-component__icon--left" aria-hidden="true">
          <ng-container *ngTemplateOutlet="leftIconTemplate"></ng-container>
        </span>
      } @else if (leftIconClass) {
        <i [class]="leftIconClass + ' input-component__icon input-component__icon--left'" aria-hidden="true">{{
          leftIconContent
        }}</i>
      }

      <span [class]="nativeFieldClasses + (showPlaceholderStyle ? ' text-gray-400' : '')">{{ displayLabel }}</span>

      @if (rightIconTemplate) {
        <span class="input-component__icon input-component__icon--right" aria-hidden="true">
          <ng-container *ngTemplateOutlet="rightIconTemplate"></ng-container>
        </span>
      } @else if (rightIconClass) {
        <i [class]="rightIconClass + ' input-component__icon input-component__icon--right'" aria-hidden="true">{{
          rightIconContent
        }}</i>
      } @else if (showCalendarIcon) {
        <i class="material-icons input-component__icon input-component__icon--right text-gray-500" aria-hidden="true"
          >calendar_today</i
        >
      }
    </button>
  </div>

  @if (isOpen) {
    <div
      class="date-picker-panel"
      [class]="panelPositionClasses + ' ' + calendarPanelClass"
      [id]="panelId"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="ariaLabel || 'Calendario'"
      (click)="$event.stopPropagation()"
    >
      <div class="date-picker-panel__header">
        <dropdown-component
          class="date-picker-panel__dd"
          [items]="monthDropdownItems"
          [selectedValue]="viewMonth0"
          [variant]="headerDropdownVariant"
          [size]="headerDropdownSize"
          [shape]="headerDropdownShape"
          [fullWidth]="true"
          [autoFlipPlacement]="true"
          [hideChevron]="true"
          [closeOnSelect]="true"
          [placeholder]="'Mes'"
          [ariaLabel]="'Elegir mes'"
          [customClass]="'date-picker-header-dropdown'"
          (itemSelected)="onMonthDropdownSelect($event)"
        ></dropdown-component>
        <dropdown-component
          class="date-picker-panel__dd date-picker-panel__dd--year"
          [items]="yearDropdownItems"
          [selectedValue]="viewYear"
          [variant]="headerDropdownVariant"
          [size]="headerDropdownSize"
          [shape]="headerDropdownShape"
          [fullWidth]="true"
          [autoFlipPlacement]="true"
          [hideChevron]="true"
          [closeOnSelect]="true"
          [placeholder]="'Año'"
          [ariaLabel]="'Elegir año'"
          [customClass]="'date-picker-header-dropdown'"
          (itemSelected)="onYearDropdownSelect($event)"
        ></dropdown-component>
      </div>

      <div class="date-picker-panel__weekdays" role="row">
        @for (w of orderedWeekdayLabels; track $index) {
          <span class="date-picker-panel__weekday" role="columnheader">{{ w }}</span>
        }
      </div>

      <div class="date-picker-panel__grid" role="grid" [attr.aria-label]="'Días del mes'">
        @for (row of weeks; track $index; let ri = $index) {
          <div class="date-picker-panel__row" role="row">
            @for (cell of row; track cell.date.getTime(); let ci = $index) {
              @let idx = cellFlatIndex(ri, ci);
              <button
                type="button"
                class="date-picker-day"
                role="gridcell"
                [class.date-picker-day--outside]="!cell.inMonth"
                [class.date-picker-day--selected]="isSelectedDate(cell.date)"
                [class.date-picker-day--focused]="isFocusedCell(ri, ci)"
                [disabled]="!cell.inMonth || cell.disabled"
                [attr.data-date-cell]="instanceId + '-' + idx"
                (focus)="onDayButtonFocus(ri, ci)"
                (click)="selectDay(cell)"
                (keydown)="onDayKeydown($event, cell, idx)"
              >
                {{ cell.label }}
              </button>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
