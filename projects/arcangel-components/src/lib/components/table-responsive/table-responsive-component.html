<div class="w-full" [class]="customClass">
  <div [class]="desktopViewClasses">
    <table-component
      [headers]="headers"
      [items]="displayItems"
      [actions]="actions"
      [actionsPosition]="actionsPosition"
      [emptyMessage]="emptyMessage"
      [striped]="striped"
      [showPagination]="false"
      (actionClicked)="actionClicked.emit($event)"
    />
  </div>
  <div [class]="mobileViewClasses">
    <card-component
      [headers]="headers"
      [items]="displayItems"
      [actions]="actions"
      [actionsPosition]="actionsPosition"
      [emptyMessage]="emptyMessage"
      [showPagination]="false"
      (actionClicked)="actionClicked.emit($event)"
    />
  </div>
  @if (showPagination) {
    <paginator-component
      [totalCount]="resolvedTotalCount"
      [pageIndex]="effectivePageIndex"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      [labels]="paginationLabels"
      (paginationChange)="paginationChange.emit($event)"
    />
  }
</div>
