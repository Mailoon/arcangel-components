<div
  [class]="containerClasses()"
  (click)="handleTriggerClick($event)"
>
  <button-component
    [label]="displayLabel()"
    [variant]="variant"
    [shape]="shape"
    [size]="size"
    [fullWidth]="fullWidth"
    [square]="square"
    [disabled]="disabled"
    [leftIconClass]="leftIconClass"
    [rightIconClass]="rightIconClass"
    [leftIconTemplate]="leftIconTemplate"
    [rightIconTemplate]="rightIconTemplate ?? (hideChevron ? emptyChevron : defaultChevron)"
    [backgroundClass]="backgroundClass"
    [textClass]="textClass"
    [borderClass]="borderClass"
    [hoverClass]="hoverClass"
    [customClass]="customClass"
    [ariaLabel]="ariaLabel"
    [ariaDescribedBy]="ariaDescribedBy"
    [ariaExpanded]="isOpen()"
    [tooltip]="tooltip"
  ></button-component>

  @if (isOpen()) {
    <div
      data-arc-panel
      [class]="panelBaseClasses + ' ' + placementClasses()"
      role="listbox"
      (click)="$event.stopPropagation()"
    >
      @for (item of items; track $index) {
        @if (item.divided && $index > 0) {
          <div [class]="dividerClasses"></div>
        }
        <div
          [class]="getItemClasses(item)"
          role="option"
          [attr.aria-disabled]="item.disabled"
          [attr.aria-selected]="item.value === selectedValue"
          (click)="handleItemClick(item, $event)"
          (mouseenter)="!item.disabled && focusedIndex.set(enabledItems().indexOf(item))"
        >
          @if (itemTemplate) {
            <ng-container
              *ngTemplateOutlet="itemTemplate; context: { $implicit: item }"
            ></ng-container>
          } @else {
            @if (item.iconClass) {
              <i [class]="item.iconClass" aria-hidden="true">{{ item.iconContent ?? '' }}</i>
            }
            <span [class]="itemLabelClasses">{{ item.label }}</span>
          }
        </div>
      }
    </div>
  }
</div>

<ng-template #emptyChevron>
  <span [class]="chevronPlaceholderClasses" aria-hidden="true"></span>
</ng-template>

<ng-template #defaultChevron>
  <svg
    [class]="chevronClasses()"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <path d="M6 9l6 6 6-6" />
  </svg>
</ng-template>
